name: Build MIPS

on:
  workflow_run:
    workflows: ["Upstream Sync"]
    types:
      - completed
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-mips:
    name: Build ${{ matrix.goarch }} (${{ matrix.gomips || 'hardfloat' }})
    # Run if sync succeeded OR if manually triggered/tag push
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # MIPS 32-bit (Softfloat for maximum compatibility)
          - goos: linux
            goarch: mips
            gomips: softfloat
          - goos: linux
            goarch: mipsle
            gomips: softfloat
          # MIPS 64-bit (Defaulting to hardfloat usually fine for 64-bit CPUs)
          - goos: linux
            goarch: mips64
          - goos: linux
            goarch: mips64le

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        check-latest: true

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOMIPS: ${{ matrix.gomips }}
        CGO_ENABLED: 0
      run: |
        echo "Building for $GOOS/$GOARCH (GOMIPS=$GOMIPS)..."
        
        # Determine version variables
        VERSION=$(git describe --tags --always --dirty --match "v*" 2> /dev/null || echo "dev")
        BUILD_TIME=$(date -u +%FT%T%z)
        
        echo "Version: $VERSION"
        echo "Build Time: $BUILD_TIME"
        
        # Build command with linker flags for versioning
        # -s -w: Strip debug info to reduce binary size
        go build -v -trimpath -ldflags "-s -w -X 'main.Version=${VERSION}' -X 'main.BuildTime=${BUILD_TIME}'" -o cloudflared-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cloudflared
        
        # Verify build
        ls -lh cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}

    - name: Generate Checksum
      run: |
        sha256sum cloudflared-${{ matrix.goos }}-${{ matrix.goarch }} > cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
        cat cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}
        path: |
          cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}
          cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
        retention-days: 30

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}
          cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
        generate_release_notes: true
